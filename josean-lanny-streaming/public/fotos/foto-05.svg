<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1" gradientTransform="rotate(145)">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.45" stop-color="#1a0306"/>
      <stop offset="1" stop-color="rgb(165, 9, 20)"/>
    </linearGradient>
    <radialGradient id="r" cx="72%" cy="22%" r="70%">
      <stop offset="0" stop-color="#ff6b7a" stop-opacity="0.75"/>
      <stop offset="0.38" stop-color="#e50914" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.18"/></feComponentTransfer>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#g)"/>
  <rect width="1600" height="1000" fill="url(#r)"/>
  <rect width="1600" height="1000" filter="url(#noise)" opacity="0.55"/>
  <circle cx="1190" cy="180" r="310" fill="#e50914" opacity="0.16"/>
  <circle cx="1330" cy="300" r="210" fill="#fff" opacity="0.055"/>
  <path d="M0 680 C260 600 420 760 680 655 C920 558 1040 480 1600 560 L1600 1000 L0 1000 Z" fill="#000" opacity="0.47"/>
  <g filter="url(#shadow)">
    <rect x="120" y="160" width="520" height="660" rx="58" fill="#111" opacity="0.78"/>
    <rect x="150" y="190" width="460" height="600" rx="40" fill="none" stroke="#ffffff" opacity="0.16" stroke-width="3"/>
    <text x="380" y="460" text-anchor="middle" fill="#e50914" font-size="86" font-weight="900" font-family="Arial, Helvetica, sans-serif">J&amp;L</text>
    <text x="380" y="535" text-anchor="middle" fill="#fff" font-size="34" font-weight="700" font-family="Arial, Helvetica, sans-serif">substitua por foto</text>
  </g>
  <text x="780" y="430" fill="#ffffff" font-size="82" font-weight="900" letter-spacing="-4" font-family="Arial, Helvetica, sans-serif">Próxima temporada</text>
  <text x="786" y="505" fill="#ffb7bf" font-size="38" font-weight="700" font-family="Arial, Helvetica, sans-serif">Para sempre</text>
  <text x="786" y="590" fill="#ffffff" opacity="0.72" font-size="28" font-family="Arial, Helvetica, sans-serif">Josean &amp; Lanny • 2 anos e 2 meses</text>
</svg>